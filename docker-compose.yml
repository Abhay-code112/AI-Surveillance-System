version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: surveillance_backend
    env_file:
      - .env
    volumes:
      - surveillance_db:/app/data
      - ./storage:/app/storage
      - huggingface_cache:/home/appuser/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - surveillance_net

  frontend:
    build:
      context: ./frontend
    container_name: surveillance_frontend
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - surveillance_net

volumes:
  surveillance_db:
  huggingface_cache:

networks:
  surveillance_net:
    driver: bridge
